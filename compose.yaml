name: smartcopilot

x-backend-environment: &backend-environment
  APP_ENV: production
  MYSQL_DSN: mysql+asyncmy://${MYSQL_USER:-smartcopilot}:${MYSQL_PASSWORD:-SmartCopilotDb123}@mysql:3306/${MYSQL_DATABASE:-smartcopilot}?charset=utf8mb4
  REDIS_URL: redis://:${REDIS_PASSWORD:-SmartCopilotRedis123}@redis:6379/0
  ELASTICSEARCH_URL: http://elasticsearch:9200
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_FILE_PROCESSING_TOPIC: file-processing
  KAFKA_FILE_PROCESSING_GROUP_ID: smartcopilot-file-processing
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-smartcopilot}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-SmartCopilotMinio123}
  MINIO_SECURE: "false"
  MINIO_UPLOAD_BUCKET: ${MINIO_UPLOAD_BUCKET:-uploads}
  UPLOAD_STORAGE_DIR: /app/storage/uploads
  JWT_SECRET: ${JWT_SECRET:-change-this-before-production}
  FREE_LLM_BASE_URL: ${FREE_LLM_BASE_URL:-}
  FREE_LLM_API_KEY: ${FREE_LLM_API_KEY:-}
  FREE_LLM_MODEL: ${FREE_LLM_MODEL:-}
  PAID_LLM_BASE_URL: ${PAID_LLM_BASE_URL:-}
  PAID_LLM_API_KEY: ${PAID_LLM_API_KEY:-}
  PAID_LLM_MODEL: ${PAID_LLM_MODEL:-}
  EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-2048}

x-backend-build: &backend-build
  context: .
  dockerfile: docker/backend.Dockerfile

services:
  mysql:
    image: mysql:8.4.10
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartcopilot}
      MYSQL_USER: ${MYSQL_USER:-smartcopilot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-SmartCopilotDb123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-SmartCopilotRoot123}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/sql/create_table.sql:/docker-entrypoint-initdb.d/001-create-table.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [backend]

  redis:
    image: redis:7.4.9-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-SmartCopilotRedis123}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  kafka:
    image: apache/kafka:3.9.2
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks: [backend]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.6
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks: [backend]

  minio:
    image: minio/minio:RELEASE.2025-07-18T21-56-31Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smartcopilot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-SmartCopilotMinio123}
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [backend]

  database-init:
    build: *backend-build
    environment:
      <<: *backend-environment
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-SmartCopilot123}
    command: ["python", "-m", "app.init_database"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"
    networks: [backend]

  backend:
    build: *backend-build
    restart: unless-stopped
    environment:
      <<: *backend-environment
    volumes:
      - backend-storage:/app/storage
    depends_on:
      database-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/api/v1/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [frontend, backend]

  worker:
    build: *backend-build
    restart: unless-stopped
    command: ["python", "-m", "app.workers.file_processing_worker"]
    environment:
      <<: *backend-environment
    volumes:
      - backend-storage:/app/storage
    depends_on:
      database-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [backend]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SMARTCOPILOT_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [frontend]

networks:
  frontend:
  backend:

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  elasticsearch-data:
  minio-data:
  backend-storage:
